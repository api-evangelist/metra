    name: Metra GTFS API
    description: >-
      The Metra GTFS API provides both raw data and JSON for Metra commuter
      rail schedules, trips, stops, and real-time transit information.
      Developers must redistribute data through their own host and not direct
      users to access data directly from Metra's servers.
