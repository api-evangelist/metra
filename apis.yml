aid: metra
name: Metra
description: >-
  Metra provides GTFS API data for the Metra commuter rail system in the Chicago
  metropolitan area. The API is hosted at gtfsapi.metrarail.com and provides
  both RAW data and JSON for schedules, trips, stops, and real-time updates.
